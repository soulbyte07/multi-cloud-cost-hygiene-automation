name: Cost Janitor
run-name: ${{ github.actor }} — Cost Hygiene Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cost-scan:
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3.8.1
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,s3
          ACTIVATE_PRO: "0"
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Install tflocal
        run: pip install terraform-local

      - name: Install Python deps
        run: pip install -r nimbuskart-janitor/requirements.txt

      - name: Set LocalStack env
        run: |
          echo "AWS_ACCESS_KEY_ID=test" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=test" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL=http://localhost:4566" >> $GITHUB_ENV

      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_localstack/health > /dev/null && break
            echo "Waiting for LocalStack... ($i)"
            sleep 2
          done

      - name: Terraform fmt check
        run: tflocal -chdir=terraform fmt -check -diff
        continue-on-error: true

      - name: Terraform validate
        run: tflocal -chdir=terraform validate

      - name: Terraform init
        run: tflocal -chdir=terraform init

      - name: Terraform apply
        run: tflocal -chdir=terraform apply -auto-approve

      - name: Run Janitor (dry-run)
        run: python nimbuskart-janitor/janitor.py --dry-run

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: cost-janitor-reports
          path: |
            report.json
            summary.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('summary.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
